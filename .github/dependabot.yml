version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # Majors arrive as individual PRs so one incompatible bump does not
      # block the routine minor/patch batch.
      npm-dependencies:
        patterns: ['*']
        update-types: ['minor', 'patch']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
