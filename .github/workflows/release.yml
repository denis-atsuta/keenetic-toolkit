name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME}"
          if [ "$pkg" != "$tag" ]; then
            echo "Tag $tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck, lint, formatting
        run: npm run check

      - name: Package (Chrome)
        run: npm run zip

      - name: Package (Firefox)
        run: npm run zip:firefox

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            .output/*-chrome.zip \
            .output/*-firefox.zip
